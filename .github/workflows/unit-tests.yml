name: Unit Tests

on:
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Kept in sync with destipak: Dockerfile pins Python, requirements/base.txt pins Django.
      PYTHON_VERSION: "3.11.2"
      DJANGO_VERSION: "4.2.26"

    name: python-${{ env.PYTHON_VERSION }},django-${{ env.DJANGO_VERSION }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt -r requirements-dev.txt
        pip install "django==${{ env.DJANGO_VERSION }}"

    - name: run tests
      run: |
        export PYLINTRC=.pylintrc
        python -m run_lint.py

