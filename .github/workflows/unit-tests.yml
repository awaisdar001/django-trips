name: Unit Tests

on:
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      # Single entry, kept as a matrix only so the job name below can show it.
      matrix:
        python-version: ["3.13"]

    name: python-${{ matrix.python-version }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Dependencies
      run: pip install -r requirements.txt -r requirements-dev.txt

    - name: Show resolved versions
      run: |
        python --version
        python -c "import django; print('Django', django.get_version())"
        python -c "import rest_framework; print('djangorestframework', rest_framework.VERSION)"

    - name: run tests
      run: |
        export PYLINTRC=.pylintrc
        python -m run_lint.py

